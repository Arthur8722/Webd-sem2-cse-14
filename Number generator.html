<!DOCTYPE html>
<html>
<head>
    <title>Number Pattern Generator</title>
</head>
<body>

<input type="number" id="num">
<button onclick="generate()">Generate the pattern</button>

<pre id="output"></pre>

<script>
function generate() {
    let n = document.getElementById("num").value;
    let result = "";

    for (let i = 1; i <= n; i++) {
        for (let j = 1; j <= i; j++) {
            result += j + " ";
        }
        result += "\n";
    }

    document.getElementById("output").textContent = result;
}
</script>

</body>
</html>
